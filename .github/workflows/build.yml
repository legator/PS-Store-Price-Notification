name: Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore "PS Store Price Notification\PSPriceNotification.Tests\PSPriceNotification.Tests.csproj"

      - name: Build
        run: dotnet build "PS Store Price Notification\PSPriceNotification.Tests\PSPriceNotification.Tests.csproj" --no-restore -c Release

      - name: Test
        run: dotnet test "PS Store Price Notification\PSPriceNotification.Tests\PSPriceNotification.Tests.csproj" --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Tests
          path: "**/*.trx"
          reporter: dotnet-trx

      - name: Publish executable
        run: dotnet publish "PS Store Price Notification\PSPriceNotification.csproj" -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PSPriceNotification
          path: publish\PSPriceNotification.exe
          if-no-files-found: error
