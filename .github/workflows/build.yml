name: Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  checks: write
  pull-requests: write

jobs:
  shell-syntax:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate shell scripts
        run: bash -n setup_task.sh Update-Locales.sh

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore "PSPriceNotification.Tests/PSPriceNotification.Tests.csproj"

      - name: Build
        run: dotnet build "PSPriceNotification.Tests/PSPriceNotification.Tests.csproj" --no-restore -c Release

      - name: Test
        run: dotnet test "PSPriceNotification.Tests/PSPriceNotification.Tests.csproj" --no-build -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Tests (${{ matrix.os }})
          path: "TestResults/test-results.trx"
          reporter: dotnet-trx

      - name: Publish executable
        if: matrix.os == 'windows-latest'
        run: dotnet publish "PSPriceNotification.csproj" -c Release -r win-x64 -f net10.0-windows10.0.17763.0 --self-contained true -p:PublishSingleFile=true -o publish

      - name: Upload artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: PSPriceNotification
          path: publish\PSPriceNotification.exe
          if-no-files-found: error
